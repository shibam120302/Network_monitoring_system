version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nm-postgres
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
      POSTGRES_DB: network_monitoring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nm-api
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://monitor:monitor@postgres:5432/network_monitoring
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend
      - ../database:/app/database
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nm-celery-worker
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://monitor:monitor@postgres:5432/network_monitoring
      CELERY_BROKER_URL: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - api
    volumes:
      - ../backend:/app/backend
      - ../database:/app/database
    command: celery -A backend.celery_app worker -l info -Q monitoring,remediation,reports

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nm-celery-beat
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://monitor:monitor@postgres:5432/network_monitoring
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      - redis
      - api
    volumes:
      - ../backend:/app/backend
    command: celery -A backend.celery_app beat -l info

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: nm-dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  postgres_data: {}
